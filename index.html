<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TREINO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --accent: #c8f542;
    --accent2: #42f5c8;
    --danger: #f54242;
    --text: #f0f0f0;
    --muted: #6b6b80;
    --border: #2a2a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  .screen { display: none; min-height: 100dvh; flex-direction: column; }
  .screen.active { display: flex; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: var(--accent); }
  .logo span { color: var(--text); }

  .topbar-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; color: var(--text); text-align: center; flex: 1; }

  .btn-icon {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; transition: all 0.15s; flex-shrink: 0;
  }
  .btn-icon:active { transform: scale(0.92); background: var(--surface2); }

  .scroll-body { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 120px; }

  .section-label {
    font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 14px;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 18px; margin-bottom: 12px; position: relative; overflow: hidden;
    cursor: pointer; transition: border-color 0.2s;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 4px; height: 100%; background: var(--accent); border-radius: 4px 0 0 4px;
  }
  .card.group-card::before { background: var(--accent2); }
  .card:active { border-color: var(--accent); }
  .card.group-card:active { border-color: var(--accent2); }

  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .card-tag { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--accent); line-height: 1; display: flex; align-items: center; gap: 8px; }
  .card.group-card .card-tag { color: var(--accent2); font-size: 20px; }
  .card-icon { font-size: 26px; line-height: 1; }
  .card-actions { display: flex; gap: 8px; }

  .btn-sm {
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    padding: 6px 10px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .btn-sm:active { transform: scale(0.9); }

  .card-meta { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; }

  .btn-start {
    width: 100%; margin-top: 14px; background: var(--accent); color: #0a0a0f; border: none;
    padding: 14px; border-radius: 12px; font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 3px; cursor: pointer; transition: all 0.15s;
  }
  .btn-start:active { transform: scale(0.97); opacity: 0.85; }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 44px; margin-bottom: 14px; }
  .empty-state p { font-size: 13px; line-height: 1.7; }

  .fab {
    position: fixed; bottom: 90px; right: 20px;
    background: var(--accent); color: #0a0a0f; width: 52px; height: 52px;
    border-radius: 14px; border: none; font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 8px 28px rgba(200,245,66,0.35);
    transition: all 0.15s; z-index: 100;
  }
  .fab:active { transform: scale(0.9); }

  .backup-bar {
    display: flex; gap: 10px; padding: 14px 20px;
    border-top: 1px solid var(--border); background: var(--bg);
    position: fixed; bottom: 0; left: 0; right: 0;
  }

  .btn-backup {
    flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    padding: 12px 8px; border-radius: 12px; font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 1px; cursor: pointer; transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .btn-backup .bk-icon { font-size: 16px; }
  .btn-backup:active { border-color: var(--accent2); color: var(--accent2); transform: scale(0.96); }

  .field-group { margin-bottom: 18px; }
  .field-label {
    font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 8px; display: block;
  }
  .field-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); padding: 14px 16px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s;
  }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--muted); }
  .emoji-input { font-size: 32px; text-align: center; padding: 10px; letter-spacing: 0; }

  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .num-block { display: flex; flex-direction: column; gap: 8px; }
  .num-input {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); padding: 16px 12px; font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 1px; outline: none; text-align: center;
    width: 100%; transition: border-color 0.2s;
  }
  .num-input:focus { border-color: var(--accent); }
  .num-input::placeholder { color: var(--muted); font-size: 20px; }

  .save-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 20px; background: var(--bg); border-top: 1px solid var(--border); }
  .btn-save {
    width: 100%; background: var(--accent); color: #0a0a0f; border: none;
    padding: 16px; border-radius: 14px; font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 3px; cursor: pointer;
  }
  .btn-save:active { transform: scale(0.97); opacity: 0.85; }

  /* ACTIVE */
  .active-topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid var(--border); }
  .active-label { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 4px; color: var(--muted); }
  .active-right { display: flex; align-items: center; gap: 10px; }
  .cronometro { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--accent2); letter-spacing: 1px; }

  .btn-stop {
    background: rgba(245,66,66,0.12); border: 1px solid rgba(245,66,66,0.3); color: var(--danger);
    padding: 8px 14px; border-radius: 10px; font-family: 'Space Mono', monospace; font-size: 11px; cursor: pointer;
  }
  .btn-stop:active { background: rgba(245,66,66,0.25); }

  .active-body { flex: 1; display: flex; flex-direction: column; padding: 28px 20px; gap: 22px; overflow-y: auto; }

  .ex-progress { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--muted); text-align: center; }
  .ex-number-big { font-family: 'Bebas Neue', sans-serif; font-size: 80px; color: var(--accent); text-align: center; line-height: 1; }
  .ex-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--muted); text-align: center; margin-top: -12px; }

  .series-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .serie-dot {
    width: 46px; height: 46px; border-radius: 12px; border: 2px solid var(--border);
    background: var(--surface); display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--muted); transition: all 0.2s;
  }
  .serie-dot.done { background: var(--accent); border-color: var(--accent); color: #0a0a0f; }
  .serie-dot.current { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 0 3px rgba(200,245,66,0.2); }

  .info-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .info-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: center; }
  .info-card-label { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .info-card-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent2); line-height: 1; }
  .info-card-unit { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .action-area { display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
  .btn-done-serie {
    width: 100%; background: var(--accent); color: #0a0a0f; border: none;
    padding: 18px; border-radius: 16px; font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; letter-spacing: 3px; cursor: pointer; transition: all 0.15s;
  }
  .btn-done-serie:active { transform: scale(0.97); opacity: 0.85; }
  .btn-done-serie:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-next-exercise {
    width: 100%; background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 14px; border-radius: 14px; font-family: 'Space Mono', monospace;
    font-size: 12px; letter-spacing: 2px; cursor: pointer;
  }
  .btn-next-exercise:active { border-color: var(--accent2); color: var(--accent2); }

  /* REST */
  .rest-overlay {
    position: fixed; inset: 0; background: rgba(10,10,15,0.97);
    backdrop-filter: blur(10px); z-index: 150; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 16px; text-align: center;
  }
  .rest-overlay.show { display: flex; }

  .rest-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 6px; color: var(--accent2); }
  .rest-timer-big { font-family: 'Bebas Neue', sans-serif; font-size: 100px; color: var(--text); line-height: 1; }
  .rest-timer-big.tick { color: var(--accent); }

  .rest-next {
    font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--muted);
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 18px;
  }
  .rest-next span { color: var(--accent2); }

  .btn-skip-rest {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 12px 32px; border-radius: 12px; font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 2px; cursor: pointer; margin-top: 4px;
  }
  .btn-skip-rest:active { border-color: var(--danger); color: var(--danger); }

  /* RESUME BANNER */
  .resume-banner {
    background: var(--surface2); border: 1px solid var(--accent2); border-radius: 14px;
    padding: 16px 18px; margin-bottom: 12px; display: none;
    align-items: center; justify-content: space-between; gap: 12px;
  }
  .resume-banner.show { display: flex; }
  .resume-text { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent2); letter-spacing: 1px; line-height: 1.6; }
  .btn-resume {
    background: var(--accent2); color: #0a0a0f; border: none; padding: 10px 16px;
    border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 16px;
    letter-spacing: 2px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }

  /* FINISH */
  .finish-overlay {
    position: fixed; inset: 0; background: var(--bg); z-index: 200; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; text-align: center; padding: 40px;
  }
  .finish-overlay.show { display: flex; }
  .finish-icon { font-size: 68px; animation: pulse 1s ease-in-out infinite alternate; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.12); } }
  .finish-title { font-family: 'Bebas Neue', sans-serif; font-size: 54px; letter-spacing: 4px; color: var(--accent); line-height: 1; }
  .finish-sub { font-size: 14px; color: var(--muted); line-height: 1.8; }
  .btn-finish {
    background: var(--accent); color: #0a0a0f; border: none; padding: 16px 48px;
    border-radius: 14px; font-family: 'Bebas Neue', sans-serif; font-size: 22px;
    letter-spacing: 3px; cursor: pointer; margin-top: 8px;
  }

  .toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 10px 20px; border-radius: 20px; font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 1px; opacity: 0; transition: all 0.3s;
    pointer-events: none; white-space: nowrap; z-index: 500;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home-screen" class="screen active">
  <div class="topbar">
    <div class="logo">TREINO<span>.</span></div>
    <button class="btn-icon" onclick="openNewGroup()" style="background:var(--surface2);border-color:var(--accent2);color:var(--accent2);font-size:22px">🏋️</button>
  </div>
  <div class="scroll-body">
    <div id="resume-banner" class="resume-banner">
      <div class="resume-text" id="resume-text">Treino em andamento</div>
      <button class="btn-resume" onclick="resumeWorkout()">RETOMAR</button>
    </div>
    <div class="section-label">Grupos de treino</div>
    <div id="group-list"></div>
  </div>
  <div class="backup-bar">
    <button class="btn-backup" onclick="exportJSON()"><span class="bk-icon">⬇️</span>EXPORTAR</button>
    <button class="btn-backup" onclick="document.getElementById('import-input').click()"><span class="bk-icon">⬆️</span>IMPORTAR</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>
</div>

<!-- GRUPO -->
<div id="group-screen" class="screen">
  <div class="topbar">
    <button class="btn-icon" onclick="show('home-screen')">←</button>
    <div class="topbar-title" id="group-screen-title">GRUPO</div>
    <div style="width:40px"></div>
  </div>
  <div class="scroll-body"><div id="workout-list"></div></div>
  <button class="fab" onclick="openNewWorkout()">＋</button>
</div>

<!-- EDIT GRUPO -->
<div id="edit-group-screen" class="screen">
  <div class="topbar">
    <button class="btn-icon" onclick="show('home-screen')">←</button>
    <div class="topbar-title" id="edit-group-title">NOVO GRUPO</div>
    <div style="width:40px"></div>
  </div>
  <div class="scroll-body">
    <div class="field-group">
      <label class="field-label">Ícone (emoji)</label>
      <input id="grp-icon" class="field-input emoji-input" type="text" placeholder="🏋️" maxlength="4">
    </div>
    <div class="field-group">
      <label class="field-label">Nome do grupo</label>
      <input id="grp-name" class="field-input" type="text" placeholder="Ex: Hipertrofia Janeiro" maxlength="50">
    </div>
  </div>
  <div class="save-bar"><button class="btn-save" onclick="saveGroup()">SALVAR GRUPO</button></div>
</div>

<!-- EDIT TREINO -->
<div id="edit-workout-screen" class="screen">
  <div class="topbar">
    <button class="btn-icon" onclick="show('group-screen')">←</button>
    <div class="topbar-title" id="edit-workout-title">NOVO TREINO</div>
    <div style="width:40px"></div>
  </div>
  <div class="scroll-body">
    <div class="field-group">
      <label class="field-label">Nome do treino</label>
      <input id="wk-name" class="field-input" type="text" placeholder="Ex: Treino A" maxlength="50">
    </div>
    <hr class="divider">
    <div class="field-group">
      <label class="field-label">Configuração</label>
      <div class="three-col">
        <div class="num-block">
          <span class="field-label" style="text-align:center">Exercícios</span>
          <input id="wk-exercises" class="num-input" type="number" min="1" max="30" placeholder="6">
        </div>
        <div class="num-block">
          <span class="field-label" style="text-align:center">Séries</span>
          <input id="wk-series" class="num-input" type="number" min="1" max="20" placeholder="3">
        </div>
        <div class="num-block">
          <span class="field-label" style="text-align:center">Desc (s)</span>
          <input id="wk-rest" class="num-input" type="number" min="0" max="600" placeholder="60">
        </div>
      </div>
    </div>
  </div>
  <div class="save-bar"><button class="btn-save" onclick="saveWorkout()">SALVAR TREINO</button></div>
</div>

<!-- ACTIVE -->
<div id="active-screen" class="screen">
  <div class="active-topbar">
    <div class="active-label" id="active-workout-label">TREINO A</div>
    <div class="active-right">
      <div class="cronometro" id="cronometro">00:00</div>
      <button class="btn-stop" onclick="confirmStop()">ENCERRAR</button>
    </div>
  </div>
  <div class="active-body">
    <div class="ex-progress" id="ex-progress">EXERCÍCIO 1 / 6</div>
    <div class="ex-number-big" id="ex-number">1</div>
    <div class="ex-label">EXERCÍCIO ATUAL</div>
    <div class="series-row" id="series-row"></div>
    <div class="info-cards">
      <div class="info-card">
        <div class="info-card-label">Séries feitas</div>
        <div class="info-card-value" id="ex-series-done">0</div>
        <div class="info-card-unit" id="ex-series-total">de 3</div>
      </div>
      <div class="info-card">
        <div class="info-card-label">Descanso</div>
        <div class="info-card-value" id="ex-rest">60</div>
        <div class="info-card-unit">seg</div>
      </div>
    </div>
    <div class="action-area">
      <button class="btn-done-serie" id="btn-done-serie" onclick="doneSerie()">SÉRIE FEITA ✓</button>
      <button class="btn-next-exercise" onclick="skipToNext()">PRÓXIMO EXERCÍCIO →</button>
    </div>
  </div>
</div>

<!-- REST OVERLAY -->
<div class="rest-overlay" id="rest-overlay">
  <div class="rest-title">DESCANSANDO</div>
  <div class="rest-timer-big" id="rest-countdown">60</div>
  <div class="rest-next" id="rest-next">PRÓXIMO: <span>EXERCÍCIO 2</span></div>
  <button class="btn-skip-rest" onclick="confirmSkipRest()">PULAR DESCANSO</button>
</div>

<!-- FINISH -->
<div class="finish-overlay" id="finish-overlay">
  <div class="finish-icon">🏆</div>
  <div class="finish-title">TREINO<br>CONCLUÍDO!</div>
  <div class="finish-sub" id="finish-stats"></div>
  <button class="btn-finish" onclick="goHome()">VOLTAR AO INÍCIO</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let data = JSON.parse(localStorage.getItem('treino_v3') || '{"groups":[],"workouts":[]}');
let currentGroupId = null;
let editingGroupId = null;
let editingWorkoutId = null;
let activeWorkout = null;
let currentExIdx = 0;
let currentSerie = 0;
let restInterval = null;
let restCallback = null;
let audioCtx = null;
let wakeLock = null;
let cronoInterval = null;
let cronoSeconds = 0;
let isResting = false;
let restRemaining = 0;

// ── UTILS ──
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function persist() { localStorage.setItem('treino_v3', JSON.stringify(data)); }

function goHome() {
  clearRest();
  stopCrono();
  releaseWakeLock();
  document.getElementById('rest-overlay').classList.remove('show');
  document.getElementById('finish-overlay').classList.remove('show');
  renderGroups();
  show('home-screen');
}

// ── SOUND ──
function playTone(freq, startDelay, dur, vol) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = audioCtx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0, ctx.currentTime + startDelay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + startDelay + 0.01);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + startDelay + dur);
    osc.start(ctx.currentTime + startDelay);
    osc.stop(ctx.currentTime + startDelay + dur + 0.05);
  } catch(e) {}
}

function playBeep() {
  // 3 bipes fortes e longos
  playTone(880,  0,    0.25, 1.0);
  playTone(880,  0.35, 0.25, 1.0);
  playTone(1320, 0.70, 0.50, 1.0);
}

function playTickBeep() {
  // bipe curto de contagem
  playTone(660, 0, 0.12, 0.9);
}

// ── VIBRAÇÃO ──
function vibrate() {
  try { if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]); } catch(e) {}
}
function alertEnd() { playBeep(); vibrate(); }

// ── WAKELOCK ──
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}
function releaseWakeLock() {
  try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch(e) {}
}

// ── CRONÔMETRO ──
function startCrono() {
  cronoSeconds = 0;
  updateCronoDisplay();
  cronoInterval = setInterval(() => { cronoSeconds++; updateCronoDisplay(); }, 1000);
}
function stopCrono() { if (cronoInterval) { clearInterval(cronoInterval); cronoInterval = null; } }
function updateCronoDisplay() {
  const m = String(Math.floor(cronoSeconds / 60)).padStart(2, '0');
  const s = String(cronoSeconds % 60).padStart(2, '0');
  const el = document.getElementById('cronometro');
  if (el) el.textContent = `${m}:${s}`;
}
function formatCrono(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  if (m === 0) return `${s}s`;
  return s === 0 ? `${m}min` : `${m}min ${s}s`;
}

// ── SAVE/RESTORE TREINO ATIVO ──
function saveActiveState() {
  if (!activeWorkout) return;
  localStorage.setItem('treino_active', JSON.stringify({
    workoutId: activeWorkout.id,
    currentExIdx,
    currentSerie,
    cronoSeconds,
    isResting,
    restRemaining
  }));
}

function clearActiveState() {
  localStorage.removeItem('treino_active');
}

function checkResume() {
  const saved = localStorage.getItem('treino_active');
  if (!saved) return;
  try {
    const s = JSON.parse(saved);
    const w = data.workouts.find(x => x.id === s.workoutId);
    if (!w) { clearActiveState(); return; }
    const banner = document.getElementById('resume-banner');
    const text = document.getElementById('resume-text');
    text.innerHTML = `TREINO EM ANDAMENTO<br><span style="color:var(--text)">${w.name} · Exercício ${s.currentExIdx + 1}/${w.exercises}</span>`;
    banner.classList.add('show');
    banner._state = s;
  } catch { clearActiveState(); }
}

function resumeWorkout() {
  const banner = document.getElementById('resume-banner');
  const s = banner._state;
  if (!s) return;
  const w = data.workouts.find(x => x.id === s.workoutId);
  if (!w) return;
  banner.classList.remove('show');
  activeWorkout = w;
  currentExIdx = s.currentExIdx;
  currentSerie = s.currentSerie;
  cronoSeconds = s.cronoSeconds || 0;
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
  requestWakeLock();
  updateCronoDisplay();
  cronoInterval = setInterval(() => { cronoSeconds++; updateCronoDisplay(); saveActiveState(); }, 1000);
  document.getElementById('active-workout-label').textContent = activeWorkout.name.toUpperCase();
  renderActiveExercise();
  show('active-screen');
  if (s.isResting && s.restRemaining > 0) {
    const nextEx = currentExIdx + 1;
    startRest(s.restRemaining, () => {
      if (currentSerie >= activeWorkout.series) {
        if (nextEx >= activeWorkout.exercises) finishWorkout();
        else { currentExIdx++; currentSerie = 0; renderActiveExercise(); }
      } else { renderActiveExercise(); }
    }, nextEx);
  }
}

// ── GROUPS ──
function renderGroups() {
  const list = document.getElementById('group-list');
  if (data.groups.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🏋️</div><p>Nenhum grupo criado ainda.<br>Toque em 🏋️ para criar seu primeiro grupo.</p></div>`;
    return;
  }
  list.innerHTML = data.groups.map(g => {
    const count = data.workouts.filter(w => w.groupId === g.id).length;
    const icon = g.icon || '🏋️';
    return `<div class="card group-card" onclick="openGroup('${g.id}')">
      <div class="card-header">
        <div class="card-tag"><span class="card-icon">${esc(icon)}</span>${esc(g.name)}</div>
        <div class="card-actions">
          <button class="btn-sm" onclick="event.stopPropagation();editGroup('${g.id}')">✏️</button>
          <button class="btn-sm" onclick="event.stopPropagation();deleteGroup('${g.id}')">🗑️</button>
        </div>
      </div>
      <div class="card-meta">${count} treino${count!==1?'s':''}</div>
    </div>`;
  }).join('');
}

function openNewGroup() {
  editingGroupId = null;
  document.getElementById('edit-group-title').textContent = 'NOVO GRUPO';
  document.getElementById('grp-icon').value = '';
  document.getElementById('grp-name').value = '';
  show('edit-group-screen');
}

function editGroup(id) {
  const g = data.groups.find(x => x.id === id);
  if (!g) return;
  editingGroupId = id;
  document.getElementById('edit-group-title').textContent = 'EDITAR GRUPO';
  document.getElementById('grp-icon').value = g.icon || '';
  document.getElementById('grp-name').value = g.name;
  show('edit-group-screen');
}

function saveGroup() {
  const name = document.getElementById('grp-name').value.trim();
  const icon = document.getElementById('grp-icon').value.trim() || '🏋️';
  if (!name) { alert('Dá um nome pro grupo!'); return; }
  if (editingGroupId) {
    const g = data.groups.find(x => x.id === editingGroupId);
    g.name = name; g.icon = icon;
  } else {
    data.groups.push({ id: Date.now().toString(), name, icon });
  }
  persist(); renderGroups(); show('home-screen');
}

function deleteGroup(id) {
  const count = data.workouts.filter(w => w.groupId === id).length;
  if (!confirm(count > 0 ? `Este grupo tem ${count} treino(s). Excluir tudo? ` : 'Excluir este grupo?')) return;
  data.groups = data.groups.filter(g => g.id !== id);
  data.workouts = data.workouts.filter(w => w.groupId !== id);
  persist(); renderGroups();
}

// ── WORKOUTS ──
function openGroup(id) {
  currentGroupId = id;
  const g = data.groups.find(x => x.id === id);
  const icon = g ? (g.icon || '🏋️') : '';
  document.getElementById('group-screen-title').textContent = g ? `${icon} ${g.name.toUpperCase()}` : 'TREINOS';
  renderWorkouts();
  show('group-screen');
}

function renderWorkouts() {
  const list = document.getElementById('workout-list');
  const workouts = data.workouts.filter(w => w.groupId === currentGroupId);
  if (workouts.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">💪</div><p>Nenhum treino ainda.<br>Toque no <strong>+</strong> para adicionar.</p></div>`;
    return;
  }
  list.innerHTML = workouts.map(w => `
    <div class="card">
      <div class="card-header">
        <div class="card-tag">${esc(w.name)}</div>
        <div class="card-actions">
          <button class="btn-sm" onclick="editWorkout('${w.id}')">✏️</button>
          <button class="btn-sm" onclick="deleteWorkout('${w.id}')">🗑️</button>
        </div>
      </div>
      <div class="card-meta">${w.exercises} exercícios · ${w.series} séries · ${w.rest}s descanso</div>
      <button class="btn-start" onclick="startWorkout('${w.id}')">▶ INICIAR TREINO</button>
    </div>`).join('');
}

function openNewWorkout() {
  editingWorkoutId = null;
  document.getElementById('edit-workout-title').textContent = 'NOVO TREINO';
  ['wk-name','wk-exercises','wk-series','wk-rest'].forEach(id => document.getElementById(id).value = '');
  show('edit-workout-screen');
}

function editWorkout(id) {
  const w = data.workouts.find(x => x.id === id);
  if (!w) return;
  editingWorkoutId = id;
  document.getElementById('edit-workout-title').textContent = 'EDITAR TREINO';
  document.getElementById('wk-name').value = w.name;
  document.getElementById('wk-exercises').value = w.exercises;
  document.getElementById('wk-series').value = w.series;
  document.getElementById('wk-rest').value = w.rest;
  show('edit-workout-screen');
}

function saveWorkout() {
  const name = document.getElementById('wk-name').value.trim();
  const exercises = parseInt(document.getElementById('wk-exercises').value);
  const series = parseInt(document.getElementById('wk-series').value);
  const rest = parseInt(document.getElementById('wk-rest').value);
  if (!name) { alert('Dá um nome pro treino!'); return; }
  if (!exercises || exercises < 1) { alert('Informe a quantidade de exercícios!'); return; }
  if (!series || series < 1) { alert('Informe o número de séries!'); return; }
  if (isNaN(rest)) { alert('Informe o tempo de descanso!'); return; }
  if (editingWorkoutId) {
    Object.assign(data.workouts.find(x => x.id === editingWorkoutId), { name, exercises, series, rest });
  } else {
    data.workouts.push({ id: Date.now().toString(), groupId: currentGroupId, name, exercises, series, rest });
  }
  persist(); renderWorkouts(); show('group-screen');
}

function deleteWorkout(id) {
  if (!confirm('Excluir este treino?')) return;
  data.workouts = data.workouts.filter(w => w.id !== id);
  persist(); renderWorkouts();
}

// ── ACTIVE WORKOUT ──
function startWorkout(id) {
  activeWorkout = data.workouts.find(w => w.id === id);
  if (!activeWorkout) return;
  currentExIdx = 0; currentSerie = 0;
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
  requestWakeLock();
  startCrono();
  document.getElementById('active-workout-label').textContent = activeWorkout.name.toUpperCase();
  renderActiveExercise();
  saveActiveState();
  show('active-screen');
}

function renderActiveExercise() {
  const ex = activeWorkout;
  if (currentExIdx >= ex.exercises) { finishWorkout(); return; }
  document.getElementById('ex-progress').textContent = `EXERCÍCIO ${currentExIdx+1} / ${ex.exercises}`;
  document.getElementById('ex-number').textContent = currentExIdx + 1;
  document.getElementById('ex-series-done').textContent = currentSerie;
  document.getElementById('ex-series-total').textContent = `de ${ex.series}`;
  document.getElementById('ex-rest').textContent = ex.rest;
  const row = document.getElementById('series-row');
  row.innerHTML = '';
  for (let i = 0; i < ex.series; i++) {
    const dot = document.createElement('div');
    dot.className = 'serie-dot' + (i < currentSerie ? ' done' : i === currentSerie ? ' current' : '');
    dot.textContent = i + 1;
    row.appendChild(dot);
  }
  document.getElementById('btn-done-serie').disabled = false;
  saveActiveState();
}

function doneSerie() {
  const ex = activeWorkout;
  currentSerie++;
  renderActiveExercise();
  if (currentSerie >= ex.series) {
    document.getElementById('btn-done-serie').disabled = true;
    const isLast = currentExIdx + 1 >= ex.exercises;
    const nextEx = currentExIdx + 2;
    startRest(ex.rest, () => {
      if (isLast) finishWorkout();
      else { currentExIdx++; currentSerie = 0; renderActiveExercise(); }
    }, isLast ? null : nextEx);
  } else {
    startRest(ex.rest, () => renderActiveExercise(), currentExIdx + 1);
  }
}

function skipToNext() {
  clearRest();
  document.getElementById('rest-overlay').classList.remove('show');
  currentExIdx++; currentSerie = 0;
  if (currentExIdx >= activeWorkout.exercises) { finishWorkout(); return; }
  renderActiveExercise();
}

// ── REST ──
function startRest(seconds, cb, nextExNum) {
  clearRest();
  restCallback = cb;
  isResting = true;
  if (seconds <= 0) { isResting = false; cb(); return; }
  let rem = seconds;
  restRemaining = rem;
  const overlay = document.getElementById('rest-overlay');
  const countdown = document.getElementById('rest-countdown');
  const nextEl = document.getElementById('rest-next');

  // Próximo exercício info
  if (nextExNum != null) {
    nextEl.innerHTML = `PRÓXIMO: <span>EXERCÍCIO ${nextExNum}</span>`;
    nextEl.style.display = 'block';
  } else {
    nextEl.style.display = 'none';
  }

  overlay.classList.add('show');
  countdown.textContent = rem;
  countdown.classList.remove('tick');

  restInterval = setInterval(() => {
    rem--;
    restRemaining = rem;
    countdown.textContent = rem;

    // Bipes nos últimos 3 segundos
    if (rem > 0 && rem <= 3) {
      countdown.classList.add('tick');
      playTickBeep();
      try { if (navigator.vibrate) navigator.vibrate(60); } catch(e) {}
    } else {
      countdown.classList.remove('tick');
    }

    saveActiveState();

    if (rem <= 0) {
      clearRest();
      overlay.classList.remove('show');
      countdown.classList.remove('tick');
      alertEnd();
      cb();
    }
  }, 1000);
}

function confirmSkipRest() {
  if (confirm('Pular o descanso?')) skipRest();
}

function skipRest() {
  const cb = restCallback;
  clearRest();
  document.getElementById('rest-overlay').classList.remove('show');
  document.getElementById('rest-countdown').classList.remove('tick');
  if (cb) cb();
}

function clearRest() {
  if (restInterval) { clearInterval(restInterval); restInterval = null; }
  restCallback = null;
  isResting = false;
  restRemaining = 0;
}

// ── FINISH ──
function finishWorkout() {
  clearRest();
  stopCrono();
  releaseWakeLock();
  clearActiveState();
  document.getElementById('rest-overlay').classList.remove('show');
  const total = activeWorkout.exercises * activeWorkout.series;
  document.getElementById('finish-stats').textContent =
    `${activeWorkout.exercises} exercícios · ${total} séries\nTempo total: ${formatCrono(cronoSeconds)}`;
  alertEnd();
  document.getElementById('finish-overlay').classList.add('show');
}

function confirmStop() {
  if (confirm('Encerrar o treino agora?')) {
    clearRest(); stopCrono(); releaseWakeLock(); clearActiveState();
    document.getElementById('rest-overlay').classList.remove('show');
    goHome();
  }
}

// ── BACKUP ──
function exportJSON() {
  if (data.groups.length === 0 && data.workouts.length === 0) { showToast('Nada para exportar ainda'); return; }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'meus-treinos.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Backup exportado!');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.groups || !imported.workouts) throw new Error();
      const hasData = data.groups.length > 0 || data.workouts.length > 0;
      if (hasData && confirm('Mesclar com dados existentes? (Cancelar = substituir tudo)')) {
        const egIds = new Set(data.groups.map(g => g.id));
        const ewIds = new Set(data.workouts.map(w => w.id));
        imported.groups.forEach(g => { if (!egIds.has(g.id)) data.groups.push(g); });
        imported.workouts.forEach(w => { if (!ewIds.has(w.id)) data.workouts.push(w); });
      } else { data = imported; }
      persist(); renderGroups(); show('home-screen');
      showToast('✓ Importado com sucesso!');
    } catch { showToast('❌ Arquivo inválido'); }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── TOAST ──
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──
renderGroups();
checkResume();
</script>
